// Генерируем стабильный гостевой UUID из имени (детерминированный)
function nameToUUID(name) {
  let hash = 0;
  const s = 'guest_' + name.trim().toLowerCase();
  for (let i = 0; i < s.length; i++) {
    hash = ((hash << 5) - hash) + s.charCodeAt(i);
    hash |= 0;
  }
  const h = Math.abs(hash).toString(16).padStart(8,'0');
  return `00000000-${h.slice(0,4)}-4${h.slice(4,7)}-8${h.slice(7,8)}00-${h}0000`;
}

function showTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => {
    const tabs = ['groups','playoff','bonus'];
    el.classList.toggle('on', tabs[i] === t);
  });
  document.querySelectorAll('.page').forEach(el => el.classList.remove('on'));
  document.getElementById('page-'+t).classList.add('on');
}

    <input type="number" min="0" max="30" id="${prefix}a${no}" placeholder="-" oninput="updateProgress()">

}

    <td class="hm">${m.h}</td>
    <td class="vs">–</td>
    <td class="aw">${m.a}</td>
    <td>${makeScoreInputs('g',m.no)}</td>
    <td class="dt">${m.d}</td>
  </tr>`).join('');
  gp.innerHTML += `
    <div class="grp-hd">Группа ${g}</div>
    <table>
      <thead><tr><th>#</th><th>Хозяева</th><th></th><th>Гости</th><th style="width:80px">Прогноз</th><th>Дата</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
});

// Плей-офф
const pp = document.getElementById('page-playoff');
pp.innerHTML = `<div style="font-size:12px;color:rgba(240,237,230,.4);margin-bottom:12px;padding:8px 10px;background:rgba(255,255,255,.03);border-radius:6px">
  ℹ В плей-офф укажи счёт по итогам основного/доп. времени. Если ничья — укажи победителя по пенальти в доп. поле.
</div>`;
PLAYOFF_STAGES.forEach(s => {
  let rows = s.matches.map(m => `<tr>
    <td class="no">${m.no}</td>
    <td class="po-slot">${m.h}</td>
    <td class="vs">–</td>
    <td class="po-slot">${m.a}</td>
    <td>
      ${makeScoreInputs('p',m.no)}
      <div class="pen-row" id="pen-row-${m.no}">
        пен: <input type="text" id="pen${m.no}" placeholder="победитель" style="width:110px;height:22px;background:rgba(255,255,255,.07);border:1px solid rgba(147,197,253,.2);border-radius:4px;color:#f0ede6;font-size:11px;padding:0 6px;outline:none">
      </div>
    </td>
    <td class="dt">${m.d}</td>
  </tr>`).join('');
  pp.innerHTML += `
    <div class="grp-hd">${s.stage}</div>
    <table>
      <thead><tr><th>#</th><th>Позиция хозяев</th><th></th><th>Позиция гостей</th><th style="width:160px">Прогноз</th><th>Дата</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
});

// Слушатель ничьей в плей-офф
document.addEventListener('input', e => {
  const id = e.target.id;
  const isH = id.startsWith('ph');
  const isA = id.startsWith('pa');
  if (!isH && !isA) return;
  const no = id.slice(2);
  const h = document.getElementById('ph'+no);
  const a = document.getElementById('pa'+no);
  const row = document.getElementById('pen-row-'+no);
  if (!h || !a || !row) return;
  const draw = h.value !== '' && a.value !== '' && h.value === a.value;
  row.style.display = draw ? 'block' : 'none';
});

// Бонусы
const bp = document.getElementById('page-bonus');
bp.innerHTML = `<div class="section">` + BONUS.map(b => `
  <div class="bonus-item">
    <div class="b-row">
      <span class="b-n">${b.n}.</span>
      <span class="b-q">${b.q}</span>
      <span class="b-pts">${b.pts} оч.</span>
    </div>
    ${b.h ? `<div class="b-help">${b.h}</div>` : ''}
    <div class="b-ans">
      <input type="text" id="bonus_${b.id}" placeholder="${b.ph||'Ответ'}" oninput="updateProgress()">
    </div>
  </div>`).join('') + `</div>`;

function updateProgress() {
  let filled = 0;
  // группы
  Object.values(GROUPS).flat().forEach(m => {
    const h = document.getElementById('gh'+m.no);
    const a = document.getElementById('ga'+m.no);
    if (h && a && h.value !== '' && a.value !== '') filled++;
  });
  // плей-офф
  PLAYOFF_STAGES.forEach(s => s.matches.forEach(m => {
    const h = document.getElementById('ph'+m.no);
    const a = document.getElementById('pa'+m.no);
    if (h && a && h.value !== '' && a.value !== '') filled++;
  }));
  // бонусы
  BONUS.forEach(b => {
    const el = document.getElementById('bonus_'+b.id);
    if (el && el.value.trim() !== '') filled++;
  });
  document.getElementById('progText').textContent = `Заполнено: ${filled} / 135`;
}

// Исправляем ID инпутов - использовали 'g' prefix а нужны 'gh'/'ga'
// Переделаем makeScoreInputs чтобы использовать правильный prefix
function fixIds() {
  // групповой этап: gh73, ga73
  document.querySelectorAll('[id^="gg"]').forEach(el => {
    const old = el.id;
    el.id = old.replace(/^gg/, 'g');
  });
}

async function submitAll() {
  const name = document.getElementById('pname').value.trim();
  if (!name) { alert('Введи своё имя!'); return; }

  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('statusMsg');
  btn.disabled = true;
  status.className = 'status';
  status.textContent = 'Сохраняю...';

  const userId = nameToUUID(name);

  // Сохраняем профиль
  try {
    await fetch(`${SUPA_URL}/rest/v1/profiles`, {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify({ id: userId, name: name, display_name: name })
    });
  } catch(e) {}

  // Собираем прогнозы матчей
  const predictions = [];
  const allMatches = [
    ...Object.values(GROUPS).flat().map(m => ({...m, prefix:'g'})),
    ...PLAYOFF_STAGES.flatMap(s => s.matches.map(m => ({...m, prefix:'p'})))
  ];

  allMatches.forEach(m => {
    const hEl = document.getElementById(m.prefix+'h'+m.no);
    const aEl = document.getElementById(m.prefix+'a'+m.no);
    if (!hEl || !aEl || hEl.value === '' || aEl.value === '') return;
    const penEl = document.getElementById('pen'+m.no);
    predictions.push({
      user_id: userId,
      match_id: 'm'+m.no,
      home_score: parseInt(hEl.value),
      away_score: parseInt(aEl.value),
      predicted_winner: penEl ? penEl.value.trim() || null : null,
      updated_at: new Date().toISOString()
    });
  });

  // Сохраняем прогнозы батчами
  let savedPreds = 0;
  for (let i = 0; i < predictions.length; i += 50) {
    const batch = predictions.slice(i, i+50);
    try {
      const r = await fetch(`${SUPA_URL}/rest/v1/predictions`, {
        method: 'POST',
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': 'Bearer ' + SUPA_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=merge-duplicates,return=minimal'
        },
        body: JSON.stringify(batch)
      });
      if (r.ok) savedPreds += batch.length;
    } catch(e) {}
    status.textContent = `Сохранено матчей: ${savedPreds}/${predictions.length}...`;
  }

  // Бонусы
  const bonusRows = [];
  BONUS.forEach(b => {
    const el = document.getElementById('bonus_'+b.id);
    if (!el || !el.value.trim()) return;
    bonusRows.push({
      user_id: userId,
      question_id: b.id,
      answer: el.value.trim(),
      updated_at: new Date().toISOString()
    });
  });

  let savedBonus = 0;
  for (let i = 0; i < bonusRows.length; i += 50) {
    const batch = bonusRows.slice(i, i+50);
    try {
      const r = await fetch(`${SUPA_URL}/rest/v1/bonus_answers`, {
        method: 'POST',
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': 'Bearer ' + SUPA_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=merge-duplicates,return=minimal'
        },
        body: JSON.stringify(batch)
      });
      if (r.ok) savedBonus += batch.length;
    } catch(e) {}
  }

  status.className = 'status ok';
  status.textContent = `✓ Готово! Матчей: ${savedPreds}, бонусов: ${savedBonus}. Организатор всё получил.`;
  btn.disabled = false;
}

updateProgress();
</script>
</body>
</html>
